<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kupu AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0D0D0D;
      --paper: #F5F4F0;
      --ukaipo: #2D6A4F;
      --ukaipo-light: #D8EDDF;
      --ukaipo-mid: #52B788;
      --ai: #1A1A2E;
      --ai-accent: #E94560;
      --ai-light: #F0E6FF;
      --neutral: #E8E6E0;
      --muted: #7A7570;
      --white: #FFFFFF;
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      padding: 0;
    }

    /* HEADER */
    header {
      padding: 20px 24px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--neutral);
      background: var(--white);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--ink);
    }

    .logo span {
      color: var(--ukaipo-mid);
    }

    .tagline {
      font-size: 12px;
      color: var(--muted);
      font-style: italic;
    }

    /* MAIN */
    main {
      max-width: 640px;
      margin: 0 auto;
      padding: 24px 16px 80px;
    }

    /* BRAND SELECTOR */
    .section-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .brand-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .brand-card {
      border: 2px solid var(--neutral);
      border-radius: var(--radius);
      padding: 14px 16px;
      cursor: pointer;
      background: var(--white);
      transition: all 0.15s ease;
      text-align: left;
    }

    .brand-card:active { transform: scale(0.98); }

    .brand-card.selected.ukaipo {
      border-color: var(--ukaipo);
      background: var(--ukaipo-light);
    }

    .brand-card.selected.ai-product {
      border-color: var(--ai);
      background: var(--ai-light);
    }

    .brand-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .brand-card.selected.ukaipo .brand-name { color: var(--ukaipo); }
    .brand-card.selected.ai-product .brand-name { color: var(--ai); }

    .brand-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }

    .brand-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
      vertical-align: middle;
    }

    .dot-ukaipo { background: var(--ukaipo-mid); }
    .dot-ai { background: var(--ai-accent); }

    /* SPARK */
    .spark-section {
      margin-bottom: 20px;
    }

    .spark-input {
      width: 100%;
      background: var(--white);
      border: 2px solid var(--neutral);
      border-radius: var(--radius);
      padding: 14px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--ink);
      resize: none;
      min-height: 80px;
      transition: border-color 0.15s;
      outline: none;
    }

    .spark-input:focus { border-color: var(--ukaipo-mid); }
    .spark-input::placeholder { color: var(--muted); font-style: italic; }

    /* PLATFORM SELECTOR */
    .platform-section {
      margin-bottom: 24px;
    }

    .platform-toggles {
      display: flex;
      gap: 8px;
    }

    .platform-toggle {
      flex: 1;
      padding: 10px;
      border: 2px solid var(--neutral);
      border-radius: var(--radius-sm);
      background: var(--white);
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      transition: all 0.15s;
      text-align: center;
    }

    .platform-toggle.active {
      border-color: var(--ink);
      color: var(--ink);
      background: var(--neutral);
    }

    /* GENERATE BUTTON */
    .generate-btn {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: var(--radius);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.3px;
      margin-bottom: 28px;
    }

    .generate-btn.ukaipo-btn {
      background: var(--ukaipo);
      color: var(--white);
    }

    .generate-btn.ai-btn {
      background: var(--ai);
      color: var(--white);
    }

    .generate-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .generate-btn:not(:disabled):active { transform: scale(0.99); }

    /* LOADING */
    .loading {
      text-align: center;
      padding: 32px 0;
      color: var(--muted);
      font-style: italic;
      font-size: 14px;
    }

    .loading-dots::after {
      content: '';
      animation: dots 1.2s steps(4, end) infinite;
    }

    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }

    /* OUTPUT */
    .output-section { }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .output-count {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
    }

    .post-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid var(--neutral);
    }

    .post-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .platform-badge {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
    }

    .badge-fb { background: #E8F0FE; color: #1877F2; }
    .badge-tt { background: #FFE8F0; color: #010101; }

    .post-type {
      font-size: 11px;
      color: var(--muted);
      font-style: italic;
    }

    .post-content {
      font-size: 14px;
      line-height: 1.6;
      color: var(--ink);
      white-space: pre-wrap;
    }

    .copy-btn {
      margin-top: 12px;
      padding: 8px 14px;
      border: 1.5px solid var(--neutral);
      border-radius: var(--radius-sm);
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .copy-btn:hover, .copy-btn:active {
      border-color: var(--ink);
      color: var(--ink);
    }

    .copy-btn.copied {
      border-color: var(--ukaipo);
      color: var(--ukaipo);
    }

    /* ERROR */
    .error-msg {
      background: #FFF0F0;
      border: 1px solid #FFB3B3;
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      font-size: 14px;
      color: #CC0000;
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 40px 24px;
      color: var(--muted);
    }

    .empty-icon {
      font-size: 36px;
      margin-bottom: 12px;
    }

    .empty-text {
      font-size: 14px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">kupu<span>.</span>ai</div>
    <div style="font-size:11px;color:var(--muted);margin-top:2px;">by Hinepūororangi</div>
  </div>
  <div class="tagline">your voice. daily.</div>
</header>

<main>

  <!-- BRAND SELECTOR -->
  <div style="margin-bottom: 20px;">
    <div class="section-label">Brand</div>
    <div class="brand-selector">
      <div class="brand-card ukaipo" id="brand-ukaipo" onclick="selectBrand('ukaipo')">
        <div class="brand-name"><span class="brand-dot dot-ukaipo"></span>Ūkaipō</div>
        <div class="brand-desc">Māori maternal innovation</div>
      </div>
      <div class="brand-card ai-product" id="brand-ai" onclick="selectBrand('ai')">
        <div class="brand-name"><span class="brand-dot dot-ai"></span>Māori Tech Builder</div>
        <div class="brand-desc">Product engineering method</div>
      </div>
    </div>
  </div>

  <!-- PLATFORM TOGGLES -->
  <div class="platform-section">
    <div class="section-label">Platforms</div>
    <div class="platform-toggles">
      <div class="platform-toggle active" id="toggle-fb" onclick="togglePlatform('fb')">Facebook</div>
      <div class="platform-toggle active" id="toggle-tt" onclick="togglePlatform('tt')">TikTok</div>
    </div>
  </div>

  <!-- SPARK INPUT -->
  <div class="spark-section">
    <div class="section-label">Spark (optional)</div>
    <textarea
      class="spark-input"
      id="spark-input"
      placeholder="What's on your mind today? Leave blank to generate from brand pillars..."
      rows="3"
    ></textarea>
  </div>

  <!-- GENERATE BUTTON -->
  <button class="generate-btn" id="generate-btn" onclick="generate()" disabled>
    Select a brand to generate
  </button>

  <!-- OUTPUT -->
  <div id="output-area">
    <div class="empty-state">
      <div class="empty-icon">✍🏽</div>
      <div class="empty-text">Select your brand and hit generate.<br>Your posts will appear here.</div>
    </div>
  </div>

</main>

<script>
  let selectedBrand = null;
  let platforms = { fb: true, tt: true };
  let isLoading = false;

  const BRAND_CONFIGS = {
    ukaipo: {
      name: 'Ūkaipō',
      systemPrompt: `You are a content writer for Ūkaipō and Rauwhenua. You must follow this brand voice guide precisely.

PURPOSE:
This brand exists to honour, protect and advance Māori maternal knowledge through thoughtful contemporary innovation. Rauwhenua is founded on the belief that traditional practices remain relevant. Innovation should strengthen those practices — making them accessible within today's maternity system without replacing or diminishing them.

BRAND PERSONALITY:
Calm. Grounded. Intelligent. Respectful. Clear. Evidence-informed. Culturally confident. Future-focused.
Never loud, trendy, sensational or overly emotional.

WRITING STYLE:
Write with clarity and purpose. Use plain, confident language. Avoid marketing hype, buzzwords and exaggerated claims. Do not over-explain. Allow the kaupapa to speak for itself.

TONE:
Professional enough for: Health NZ, hospitals, midwives, clinicians, researchers, Māori health providers, government agencies, funding organisations.
Warm enough for: expectant mothers, whānau, community organisations.
Move naturally between clinical and cultural settings.

MĀORI WORLDVIEW:
Te ao Māori is the foundation — not an added feature. Tikanga and mātauranga Māori are presented as living knowledge that continues to evolve. Innovation is never positioned as replacing tradition. Contemporary solutions sit beside traditional practice. Traditional forms such as harakeke and uku remain valid and respected. Rauwhenua exists alongside these traditions as a contemporary expression.

POSITIONING — CRITICAL:
Do NOT describe Rauwhenua as: a replacement, a modern alternative, a disruption to tradition.
DO describe it as: a contemporary ipu whenua, a contemporary expression of an enduring Māori maternal practice, a product that sits alongside traditional ipu whenua, traditional practice through contemporary form.

WHAT WE DON'T SOUND LIKE:
Not a technology startup. Not a wellness brand. Not a marketing agency. Not a software company. Technology is a supporting tool, not the identity. The identity is the kaupapa.

WRITING PRINCIPLE:
Every sentence should build trust. Every idea should respect tikanga. Every innovation should acknowledge the enduring value of traditional practice.

FACEBOOK FORMAT:
- 3–5 sentences max
- Opens with a calm, grounded statement or question — never a shout
- Conversational, shareable without being sensational
- End with a soft invitation or open question
- 2–3 hashtags: #ukaipo #rauwhenua #maorihealth

TIKTOK FORMAT:
- Hook line first — clear, calm, specific (not clickbait)
- Body: 3–5 short lines, each able to stand alone
- End with an invitation or question
- 4–6 hashtags: #ukaipo #rauwhenua #maorihealth #iputikanga #maorimaternity`,

      pillars: [
        'The significance of burying the whenua and why Māori families are reclaiming this practice',
        'How Rauwhenua makes the tikanga of ipu whenua accessible for modern whānau',
        'The emotional moment of returning a tamariki\'s whenua to the earth',
        'Why midwives and LMCs are choosing Rauwhenua for their clients',
        'The gap in the system — what happens to whenua in most hospitals and why that needs to change',
      ]
    },
    ai: {
      name: 'Māori Tech Builder',
      systemPrompt: `You are a content writer for Māori Tech Builder — Kelly Bartlett's brand and social media handle (@maoritechbuilder). Kelly is based in Aotearoa New Zealand and builds real technology products using a repeatable Product Engineering Methodology she developed herself.

MISSION:
To design, build and scale technology that solves real problems for Māori communities, organisations and businesses — while creating products that can succeed globally. We don't build technology for the sake of technology. We build systems that solve meaningful problems.

BRAND VOICE:
- Direct, practical, no fluff
- Confident — not arrogant
- Speaks to people who want to build but don't know how — business owners, community organisations, Māori enterprises
- Not Silicon Valley hustle culture. Māori and Pacific lens.
- Calls out the noise in the AI space without being cynical
- Real methodology. Real products. Real outcomes.

THE METHOD (Product Engineering Methodology):
1. Discovery → 2. AI Boardroom → 3. Problem Assessment → 4. Product Architecture → 5. Data Model → 6. Commercial Review → 7. Technical Architecture → 8. Build Brief → 9. Development → 10. Deployment → 11. Continuous Improvement.

GUIDING PRINCIPLES:
Start with the problem. Challenge assumptions. Design before building. Simplicity over complexity. Systems over features. Evidence over opinion. Build products people genuinely need.

REAL PRODUCTS BUILT (reference in content):
Parikino OS (marae governance), Four Fibres OS (request management), Fast & Flawless OS (lash artist system), Manifest Smarter (personal OS), Kupu AI (content agent — the tool generating this content).

SUCCESS IS:
Real problems solved. Products adopted. Sustainable businesses created. Technology is the output. Better systems are the outcome.

FACEBOOK FORMAT:
- 3–5 sentences max
- Open with a grounded insight or challenge to an assumption
- Specific — name real tools, real outcomes, real products
- End with a question or clear CTA
- 2–3 hashtags: #maoritechbuilder #buildinpublic #productengineering

TIKTOK FORMAT:
- Hook line first — specific problem or counterintuitive truth
- 3–5 short punchy lines, each able to stand alone
- End with CTA
- Hashtags: #maoritechbuilder #buildinpublic #nztech #productengineering #aiproduct`,

      pillars: [
        'Why most tech projects fail before a single line of code is written',
        'The Product Engineering Methodology: 11 steps from discovery to deployment',
        'You don\'t need to be a developer to build real products — you need a method',
        'Building Kupu AI: from problem to deployed app in one Boardroom session',
        'Systems over features: why Māori communities need operating systems, not apps',
      ]
    }
  };

  function selectBrand(brand) {
    selectedBrand = brand;
    document.getElementById('brand-ukaipo').classList.toggle('selected', brand === 'ukaipo');
    document.getElementById('brand-ai').classList.toggle('selected', brand === 'ai');

    const btn = document.getElementById('generate-btn');
    btn.disabled = false;
    btn.className = 'generate-btn ' + (brand === 'ukaipo' ? 'ukaipo-btn' : 'ai-btn');
    btn.textContent = 'Generate kupu';
  }

  function togglePlatform(p) {
    // Ensure at least one platform is always active
    const other = p === 'fb' ? 'tt' : 'fb';
    if (platforms[p] && !platforms[other]) return;
    platforms[p] = !platforms[p];
    document.getElementById('toggle-' + p).classList.toggle('active', platforms[p]);
  }

  async function generate() {
    if (!selectedBrand || isLoading) return;

    const spark = document.getElementById('spark-input').value.trim();
    const config = BRAND_CONFIGS[selectedBrand];
    const activePlatforms = Object.entries(platforms).filter(([,v]) => v).map(([k]) => k);

    const platformLabels = { fb: 'Facebook', tt: 'TikTok' };
    const platformList = activePlatforms.map(p => platformLabels[p]).join(' and ');

    const pillar = config.pillars[Math.floor(Math.random() * config.pillars.length)];
    const topic = spark || pillar;

    const userPrompt = `Generate ${activePlatforms.length > 1 ? '3 Facebook posts and 3 TikTok posts' : activePlatforms[0] === 'fb' ? '5 Facebook posts' : '5 TikTok posts'} for ${config.name}.

Topic/spark: "${topic}"

Return ONLY valid JSON — no markdown, no backticks, no preamble.

Format:
{
  "posts": [
    {
      "platform": "Facebook" or "TikTok",
      "type": "short label like: Story, Question, Hook, Insight, CTA",
      "content": "the post text"
    }
  ]
}`;

    isLoading = true;
    document.getElementById('generate-btn').disabled = true;
    document.getElementById('generate-btn').textContent = 'Generating...';
    document.getElementById('output-area').innerHTML = '<div class="loading">Writing your kupu<span class="loading-dots"></span></div>';

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          system: config.systemPrompt,
          messages: [{ role: 'user', content: userPrompt }]
        })
      });

      const data = await response.json();
      const raw = data.content.map(b => b.text || '').join('');
      const clean = raw.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);

      renderPosts(parsed.posts, config);

    } catch (err) {
      document.getElementById('output-area').innerHTML = `<div class="error-msg">Something went wrong. Check your connection and try again.<br><small>${err.message}</small></div>`;
    } finally {
      isLoading = false;
      const btn = document.getElementById('generate-btn');
      btn.disabled = false;
      btn.textContent = 'Generate again';
    }
  }

  function renderPosts(posts, config) {
    if (!posts || posts.length === 0) {
      document.getElementById('output-area').innerHTML = '<div class="error-msg">No posts returned. Try again.</div>';
      return;
    }

    let html = `<div class="output-header">
      <div class="output-count">${posts.length} kupu generated</div>
    </div>`;

    posts.forEach((post, i) => {
      const badgeClass = post.platform === 'Facebook' ? 'badge-fb' : 'badge-tt';
      const escaped = post.content.replace(/</g, '&lt;').replace(/>/g, '&gt;');
      html += `
        <div class="post-card" id="post-${i}">
          <div class="post-meta">
            <span class="platform-badge ${badgeClass}">${post.platform}</span>
            <span class="post-type">${post.type}</span>
          </div>
          <div class="post-content">${escaped}</div>
          <button class="copy-btn" onclick="copyPost(${i}, this)"
            data-content="${post.content.replace(/"/g, '&quot;')}">
            Copy
          </button>
        </div>`;
    });

    document.getElementById('output-area').innerHTML = html;
  }

  function copyPost(i, btn) {
    const content = btn.getAttribute('data-content');
    navigator.clipboard.writeText(content).then(() => {
      btn.textContent = 'Copied ✓';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy';
        btn.classList.remove('copied');
      }, 2000);
    });
  }
</script>

</body>
</html>
